<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#ffb7d5" />
    <title>生日快乐呀</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=ZCOOL+KuaiLe&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <canvas id="fx" aria-hidden="true"></canvas>

    <div class="bg" aria-hidden="true">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="sparkles"></div>
      <div class="stickers">
        <span class="sticker s1">🍓</span>
        <span class="sticker s2">🧁</span>
        <span class="sticker s3">🎀</span>
        <span class="sticker s4">⭐</span>
        <span class="sticker s5">🍑</span>
      </div>
    </div>

    <main class="wrap">
      <header class="top">
        <div class="badge" role="img" aria-label="可爱徽章">ぷ</div>
        <div class="topText">
          <div class="kicker">给你的小小生日宇宙</div>
          <h1 id="title">生日快乐！</h1>
        </div>
      </header>

      <section class="hero">
        <div class="mascot" aria-hidden="true">
          <svg viewBox="0 0 260 240" width="260" height="240">
            <defs>
              <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
                <stop offset="0" stop-color="#ffd6ea" />
                <stop offset="1" stop-color="#c9f2ff" />
              </linearGradient>
              <filter id="s" x="-30%" y="-30%" width="160%" height="160%">
                <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#ff7bb0" flood-opacity=".25" />
              </filter>
            </defs>
            <g filter="url(#s)">
              <path
                d="M45,135 C25,80 45,35 95,48 C105,16 155,16 165,48 C215,35 235,80 215,135 C200,190 145,215 130,215 C115,215 60,190 45,135 Z"
                fill="url(#g)"
              />
              <path d="M85,55 C70,35 55,35 50,55 C55,72 72,75 85,55 Z" fill="#ffd0e2" opacity=".9" />
              <path d="M175,55 C190,35 205,35 210,55 C205,72 188,75 175,55 Z" fill="#ffd0e2" opacity=".9" />
              <circle cx="95" cy="120" r="10" fill="#2b2b2b" />
              <circle cx="165" cy="120" r="10" fill="#2b2b2b" />
              <circle cx="92" cy="117" r="3" fill="#fff" />
              <circle cx="162" cy="117" r="3" fill="#fff" />
              <path d="M130,135 C120,145 110,145 100,138" stroke="#2b2b2b" stroke-width="6" fill="none" stroke-linecap="round" />
              <path d="M130,135 C140,145 150,145 160,138" stroke="#2b2b2b" stroke-width="6" fill="none" stroke-linecap="round" />
              <path d="M130,130 C126,122 134,122 130,130 Z" fill="#ff5a9e" />
              <circle cx="78" cy="140" r="10" fill="#ff7bb0" opacity=".35" />
              <circle cx="182" cy="140" r="10" fill="#ff7bb0" opacity=".35" />
              <path
                d="M102,92 C108,72 120,62 130,62 C140,62 152,72 158,92"
                stroke="#ff7bb0"
                stroke-width="10"
                fill="none"
                stroke-linecap="round"
                opacity=".55"
              />
              <path d="M86,165 C110,190 150,190 174,165" stroke="#fff" stroke-width="10" fill="none" stroke-linecap="round" opacity=".65" />
            </g>
          </svg>
          <div class="bubble" id="bubble">点按钮会有惊喜喔！</div>
        </div>

        <div class="card">
          <div class="cardTop">
            <div class="pill">🎂 今日份可爱：已超标</div>
            <button class="iconBtn" id="themeBtn" type="button" aria-label="切换主题">
              <span aria-hidden="true">🪄</span>
            </button>
          </div>

          <div class="bigWish">
            <div class="to" id="toLine">To：你</div>
            <div class="wishText" id="wishText">愿你把每一天，都过成自己喜欢的小样子。</div>
          </div>

          <div class="actions">
            <button class="btn primary" id="musicBtn" type="button">
              <span class="dot" aria-hidden="true"></span>
              <span id="musicLabel">开启背景音乐</span>
            </button>
            <button class="btn" id="heartBtn" type="button">撒爱心</button>
            <button class="btn" id="confettiBtn" type="button">放烟花</button>
            <button class="btn" id="noteBtn" type="button">打开祝福</button>
            <button class="btn" id="cardBtn" type="button">抽一张小卡</button>
          </div>

          <div class="hint">
            手机端提示：音乐需要你先点一次「开启背景音乐」才会播放（浏览器规则）。
          </div>
        </div>
      </section>

      <footer class="foot">
        <div class="tapHint">轻触任意位置也会冒出小星星</div>
        <div class="sig" id="sig">From：一位很认真的人</div>
      </footer>
    </main>

    <dialog class="modal" id="modal">
      <div class="modalInner">
        <div class="modalTitle" id="modalTitle">给你的一封小纸条</div>
        <div class="modalBody" id="modalBody"></div>
        <div class="modalActions">
          <button class="btn primary" id="modalOk" type="button">收下啦</button>
        </div>
      </div>
    </dialog>

    <!-- 可选：如果你放了自己的 mp3 到 assets/bgm.mp3，会优先用它 -->
    <audio id="bgm" preload="auto" loop playsinline>
      <source src="./assets/bgm.mp3" type="audio/mpeg" />
    </audio>

    <script src="./app.js"></script>
  </body>
</html>
